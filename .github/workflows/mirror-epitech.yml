name: Mirror to Epitech

# Mirrors main of LenySauzet/Ankhora to EpitechMscProPromo2026/T-VIR-902-MPL_2.
# The Epitech repo is treated as write-only by this workflow — never edit it by hand.
#
# Required GitHub secret:
#   EPITECH_PAT — fine-grained PAT with Contents:read+write scope on the Epitech repo.
#                 Generated by Lény in github.com > Settings > Developer settings > Personal access tokens.
#
# Security note: the PAT is consumed ONLY via env-injected variables inside `run:`. We never
# interpolate ${{ secrets.* }} directly into shell — that pattern can leak the secret on error.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mirror-epitech
  cancel-in-progress: false

jobs:
  mirror:
    name: Push main to Epitech repo
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history + LFS)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Epitech mirror
        env:
          EPITECH_PAT: ${{ secrets.EPITECH_PAT }}
          EPITECH_REMOTE: github.com/EpitechMscProPromo2026/T-VIR-902-MPL_2.git
        run: |
          set -euo pipefail
          git config user.email "ci@ankhora.local"
          git config user.name "Ankhora CI"
          git remote add epitech "https://x-access-token:${EPITECH_PAT}@${EPITECH_REMOTE}"
          # Sync LFS objects first so the Epitech clone is usable.
          git lfs fetch --all origin || true
          git lfs push --all epitech || true
          # Force-push: the Epitech repo is mirror-only, the working repo is the single source of truth.
          git push epitech "+refs/heads/main:refs/heads/main"
