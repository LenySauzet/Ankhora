name: CI — Unity build verify

# Runs on every PR targeting main and on every push to main.
# Build target = Android (Quest 3 standalone). Runners = ubuntu-latest (GameCI Linux container handles the Android build chain).
#
# Required GitHub secrets (Unity Student / Plus / Pro license with visible serial):
#   UNITY_EMAIL     — Unity ID email
#   UNITY_PASSWORD  — Unity ID password
#   UNITY_SERIAL    — Unity serial number (Sx-XXXX-XXXX-XXXX-XXXX-XXXX)
#
# For a Personal license (no serial), swap these for a single UNITY_LICENSE secret (.ulf content).
# See SETUP-NEXT-STEPS.md §2.1.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# NOTE: pinned to 6000.4.8f1 (not the project's 6000.4.10f1) because GameCI has
# not yet published a Docker image for 6000.4.10f1. Same minor stream (6000.4),
# so Unity opens the project with only a patch-version warning. Bump to match the
# project once unityci/editor:ubuntu-6000.4.10f1-android exists.
env:
  UNITY_VERSION: 6000.4.8f1

jobs:
  build-android:
    name: Build Quest APK (Android, IL2CPP, ARM64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Cache Library/
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-
            Library-${{ runner.os }}-

      - name: Build for Android (Quest 3)
        uses: game-ci/unity-builder@v5
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          androidTargetSdkVersion: AndroidApiLevel33
          androidExportType: androidPackage
          allowDirtyBuild: false
          buildName: Ankhora

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Ankhora-Android-${{ github.sha }}
          path: build/Android
          if-no-files-found: warn
          retention-days: 7
